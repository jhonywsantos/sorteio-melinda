<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎰 Sorteio da Melinda</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        @font-face {
            font-family: 'BestSwashed';
            src: url('White-Smith.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        body {
            min-height: 100vh;
            background: url('assets/images/background.png') center/cover no-repeat;
            font-family: 'Segoe UI', 'Poppins', 'Montserrat', system-ui, -apple-system, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Container principal */
        .container {
            max-width: 650px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            border-radius: 64px;
            padding: 25px 28px 38px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            text-align: center;
            font-family: 'White-Smith', 'Segoe UI', 'Poppins', 'Montserrat', system-ui, -apple-system, sans-serif;
            font-size: 2rem;
            font-weight: 700;
            color: #33251f;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .icon {
            width: 1.2rem;
            height: 1.2rem;
            vertical-align: middle;
            margin-right: 0.35rem;
        }

        /* área da bola animada */
        .bola-area {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0 20px;
            position: relative;
        }

        .bola {
            width: 160px;
            height: 160px;
            background: radial-gradient(circle at 35% 30%, #fff, #e0e0e0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
            font-weight: 800;
            font-family: monospace;
            color: #1f2c38;
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.4), inset 0 -8px 0 rgba(0, 0, 0, 0.1), inset 0 2px 12px rgba(255, 255, 255, 0.8);
            transition: all 0.08s linear;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            border: 2px solid #f9e0a0;
        }

        /* animação de rotação e tremor */
        @keyframes rolarBola {
            0% { transform: rotate(0deg) translateX(0px) scale(1); background: radial-gradient(circle at 35% 30%, #fff0c0, #ffcf9a);}
            25% { transform: rotate(15deg) translateX(8px) scale(1.02); background: radial-gradient(circle at 40% 35%, #ffe6b3, #ffb86b);}
            50% { transform: rotate(-12deg) translateX(-6px) scale(1.05); background: radial-gradient(circle at 30% 28%, #ffffff, #ffbc7a);}
            75% { transform: rotate(8deg) translateX(4px) scale(1.02);}
            100% { transform: rotate(0deg) translateX(0px) scale(1);}
        }

        .bola-animada {
            animation: rolarBola 0.12s infinite ease-in-out;
        }

        /* controles */
        .config-panel {
            background: rgba(0, 0, 0, 0.35);
            border-radius: 48px;
            padding: 20px 24px;
            margin: 20px 0;
            backdrop-filter: blur(4px);
        }

        .range-group {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .input-box {
            flex: 1;
            min-width: 120px;
            background: #ffffffdd;
            border-radius: 44px;
            padding: 8px 18px;
            backdrop-filter: blur(2px);
            box-shadow: inset 0 1px 3px #0001, 0 2px 5px #0001;
        }

        .input-box label {
            display: block;
            font-weight: 600;
            font-size: 0.8rem;
            color: #263238;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .input-box input {
            width: 100%;
            background: transparent;
            border: none;
            font-size: 1.4rem;
            font-weight: bold;
            font-family: monospace;
            outline: none;
            color: #1e2f3a;
        }

        input[type="number"]::-webkit-inner-spin-button {
            opacity: 0.5;
        }

        .qtd-box {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #f4e9d8cc;
            border-radius: 60px;
            padding: 6px 18px;
            margin-top: 12px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .qtd-box span {
            font-weight: 600;
            color: #2c3e2b;
        }

        .qtd-box input {
            width: 90px;
            background: white;
            border: none;
            border-radius: 40px;
            padding: 8px 12px;
            font-weight: bold;
            text-align: center;
            font-size: 1.2rem;
        }

        /* botões */
        .buttons {
            display: flex;
            gap: 18px;
            justify-content: center;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        button {
            border: none;
            background: #2e3b3e;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 5px 0 #12181c;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #12181c;
        }

        .btn-sortear {
            background: #f59f00;
            color: #2c1e0a;
            box-shadow: 0 5px 0 #b16200;
        }

        .btn-reset {
            background: #2c5f6e;
            box-shadow: 0 5px 0 #1a3a44;
        }

        /* lista de sorteados */
        .sorteados-area {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 48px;
            padding: 18px;
            margin-top: 24px;
        }

        .titulo-sorteados {
            font-size: 0.9rem;
            text-transform: uppercase;
            font-weight: 600;
            letter-spacing: 2px;
            color: #ffd966;
            margin-bottom: 12px;
            text-align: center;
        }

        .numeros-sorteados {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            min-height: 70px;
            max-height: 150px;
            overflow-y: auto;
            padding: 8px 5px;
        }

        .badge-num {
            background: #efefef;
            color: #1f2c38;
            font-weight: 800;
            font-size: 1.3rem;
            font-family: monospace;
            width: 55px;
            height: 55px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            box-shadow: inset 0 -1px 0 rgba(0,0,0,0.08), 0 6px 12px rgba(0,0,0,0.12);
            transition: 0.1s;
        }

        .info-mensagem {
            text-align: center;
            font-size: 0.85rem;
            margin-top: 12px;
            color: #ffd966;
            font-weight: 500;
        }

        footer {
            font-size: 0.7rem;
            text-align: center;
            margin-top: 20px;
            color: #552200;
        }

        @media (max-width: 520px) {
            .container { padding: 18px; }
            .bola { width: 120px; height: 120px; font-size: 3rem; }
            .badge-num { width: 45px; height: 45px; font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>
        <span>🌟 Sorteio da Melinda 🐝</span>
    </h1>

    <div class="bola-area">
        <div class="bola" id="bolaNumero">?</div>
    </div>

    <div class="config-panel">
        <div class="range-group">
            <div class="input-box">
                <label><svg class="icon" viewBox="0 0 24 24" fill="#eb8900" xmlns="http://www.w3.org/2000/svg"><path d="M9,12A6,6,0,1,0,3,6,6.006,6.006,0,0,0,9,12ZM9,2A4,4,0,1,1,5,6,4,4,0,0,1,9,2Z"/><polygon points="21 10 21 7 19 7 19 10 16 10 16 12 19 12 19 15 21 15 21 12 24 12 24 10 21 10"/><path d="M13.043,14H4.957A4.963,4.963,0,0,0,0,18.957V24H2V18.957A2.96,2.96,0,0,1,4.957,16h8.086A2.96,2.96,0,0,1,16,18.957V24h2V18.957A4.963,4.963,0,0,0,13.043,14Z"/></svg> DE</label>
                <input type="number" id="minNum" value="1" step="1">
            </div>
            <div class="input-box">
                <label><svg class="icon" viewBox="0 0 24 24" fill="#eb8900" xmlns="http://www.w3.org/2000/svg"><path d="M1.879,17.878a11.259,11.259,0,0,0-1.835,4,1.739,1.739,0,0,0,2.083,2.082,11.263,11.263,0,0,0,3.994-1.834h0A3,3,0,0,0,1.879,17.878Zm2.828,2.829h0a10.07,10.07,0,0,1-2.6,1.184,10.1,10.1,0,0,1,1.184-2.6,1,1,0,0,1,1.414,1.414ZM18,8.5a2.5,2.5,0,0,1-5,0A2.5,2.5,0,0,1,18,8.5ZM20.972,0h0A15.487,15.487,0,0,0,8.634,6.006,11.065,11.065,0,0,0,4.065,7.169,8.1,8.1,0,0,0,.243,10.835a2.955,2.955,0,0,0,.25,2.8A3.009,3.009,0,0,0,3.014,15H5.5A3.517,3.517,0,0,1,9,18.5v2.486a3.009,3.009,0,0,0,1.363,2.521,2.955,2.955,0,0,0,2.8.25,8.1,8.1,0,0,0,3.666-3.822,11.065,11.065,0,0,0,1.163-4.569A15.507,15.507,0,0,0,24,3,3.009,3.009,0,0,0,20.972,0ZM4.346,13H3.014a1,1,0,0,1-.85-.461.95.95,0,0,1-.085-.91A6.176,6.176,0,0,1,4.962,8.957a8.993,8.993,0,0,1,1.993-.72A34.361,34.361,0,0,0,4.346,13Zm10.7,6.038a6.18,6.18,0,0,1-2.671,2.883.951.951,0,0,1-.911-.085,1,1,0,0,1-.461-.85V19.654a34.361,34.361,0,0,0,4.763-2.609A8.993,8.993,0,0,1,15.043,19.038Zm.135-4.02a29.92,29.92,0,0,1-4.271,2.471,5.5,5.5,0,0,0-4.4-4.4A29.92,29.92,0,0,1,8.982,8.822C12.35,4.124,15.84,2.147,21,2a1,1,0,0,1,1,.972C21.853,8.16,19.876,11.65,15.178,15.018Z"/></svg> ATÉ</label>
                <input type="number" id="maxNum" value="80" step="1">
            </div>
        </div>
        <div class="qtd-box">
            <span><svg class="icon" viewBox="0 0 24 24" fill="#eb8900" xmlns="http://www.w3.org/2000/svg"><path d="M12,6a4,4,0,1,0,4,4A4,4,0,0,0,12,6Zm0,6a2,2,0,1,1,2-2A2,2,0,0,1,12,12Z"/><path d="M12,24a5.271,5.271,0,0,1-4.311-2.2c-3.811-5.257-5.744-9.209-5.744-11.747a10.055,10.055,0,0,1,20.11,0c0,2.538-1.933,6.49-5.744,11.747A5.271,5.271,0,0,1,12,24ZM12,2.181a7.883,7.883,0,0,0-7.874,7.874c0,2.01,1.893,5.727,5.329,10.466a3.145,3.145,0,0,0,5.09,0c3.436-4.739,5.329-8.456,5.329-10.466A7.883,7.883,0,0,0,12,2.181Z"/></svg> QUANTOS SORTEAR? (máx permitido)</span>
            <input type="number" id="quantidade" value="6" min="1" max="50" step="1">
        </div>
    </div>

    <div class="buttons">
        <button class="btn-sortear" id="sortearBtn"><svg class="icon" viewBox="0 0 24 24" fill="#2c1e0a" xmlns="http://www.w3.org/2000/svg"><path d="M20.494,7.968l-9.54-7A5,5,0,0,0,3,5V19a5,5,0,0,0,7.957,4.031l9.54-7a5,5,0,0,0,0-8.064Zm-1.184,6.45-9.54,7A3,3,0,0,1,5,19V5A2.948,2.948,0,0,1,6.641,2.328,3.018,3.018,0,0,1,8.006,2a2.97,2.97,0,0,1,1.764.589l9.54,7a3,3,0,0,1,0,4.836Z"/></svg> SORTEAR NÚMERO</button>
        <button class="btn-reset" id="resetBtn"><svg class="icon" viewBox="0 0 24 24" fill="#ffffff" xmlns="http://www.w3.org/2000/svg"><path d="M12,2a10.032,10.032,0,0,1,7.122,3H16a1,1,0,0,0-1,1h0a1,1,0,0,0,1,1h4.143A1.858,1.858,0,0,0,22,5.143V1a1,1,0,0,0-1-1h0a1,1,0,0,0-1,1V3.078A11.981,11.981,0,0,0,.05,10.9a1.007,1.007,0,0,0,1,1.1h0a.982.982,0,0,0,.989-.878A10.014,10.014,0,0,1,12,2Z"/><path d="M22.951,12a.982.982,0,0,0-.989.878A9.986,9.986,0,0,1,4.878,19H8a1,1,0,0,0,1-1H9a1,1,0,0,0-1-1H3.857A1.856,1.856,0,0,0,2,18.857V23a1,1,0,0,0,1,1H3a1,1,0,0,0,1-1V20.922A11.981,11.981,0,0,0,23.95,13.1a1.007,1.007,0,0,0-1-1.1Z"/></svg> LIMPAR SORTEIO</button>
    </div>

    <div class="sorteados-area">
        <div class="titulo-sorteados">NÚMEROS SORTEADOS (sem repetir)</div>
        <div class="numeros-sorteados" id="listaSorteados">
            <div style="color:#ccccaa; text-align:center; width:100%;">Nenhum número sorteado ainda</div>
        </div>
        <div class="info-mensagem" id="statusMsg">Defina um intervalo e clique em sortear!</div>
    </div>
    <footer>⚡ bola rolando + números únicos | sem repetir até esgotar</footer>
</div>

<script>
    // DOM elements
    const bolaDiv = document.getElementById('bolaNumero');
    const minInput = document.getElementById('minNum');
    const maxInput = document.getElementById('maxNum');
    const qtdInput = document.getElementById('quantidade');
    const sortearBtn = document.getElementById('sortearBtn');
    const resetBtn = document.getElementById('resetBtn');
    const listaDiv = document.getElementById('listaSorteados');
    const statusMsg = document.getElementById('statusMsg');

    // Variáveis de estado
    let numerosSorteados = [];      // armazena números já sorteados (inteiros)
    let intervaloMin = 1;
    let intervaloMax = 80;
    let animationTimer = null;      // timeout para parar animação
    let isRolling = false;           // trava para não acumular animações
    let rollInterval = null;         // intervalo de troca rápida de números
    const rouletteAudio = new Audio('assets/audio/roulette.mp3');
    rouletteAudio.preload = 'auto';
    rouletteAudio.volume = 0.85;
    rouletteAudio.loop = false;
    const resultAudio = new Audio('assets/audio/result.mp3');
    resultAudio.preload = 'auto';
    resultAudio.volume = 0.85;
    resultAudio.loop = false;

    // Função para atualizar a lista visual dos sorteados
    function atualizarListaVisual() {
        listaDiv.innerHTML = '';
        if (numerosSorteados.length === 0) {
            listaDiv.innerHTML = '<div style="color:#ccccaa; text-align:center; width:100%;">✨ Nenhum número sorteado ainda ✨</div>';
            return;
        }
        // ordenar para exibição amigável
        const ordenados = [...numerosSorteados].sort((a,b) => a - b);
        ordenados.forEach(num => {
            const badge = document.createElement('div');
            badge.classList.add('badge-num');
            badge.textContent = num;
            listaDiv.appendChild(badge);
        });
    }

    // Atualiza mensagem de status / possibilidade de sorteio
    function atualizarStatusMsg() {
        const totalDisponivel = (intervaloMax - intervaloMin + 1);
        const jaSorteados = numerosSorteados.length;
        const restantes = totalDisponivel - jaSorteados;
        const qtdDesejada = parseInt(qtdInput.value, 10) || 1;

        if (restantes <= 0) {
            statusMsg.innerHTML = `⚠️ TODOS OS NÚMEROS DE ${intervaloMin} a ${intervaloMax} JÁ FORAM SORTEADOS! Clique em "LIMPAR" para recomeçar.`;
            sortearBtn.disabled = true;
            sortearBtn.style.opacity = '0.6';
            sortearBtn.style.cursor = 'not-allowed';
        } else {
            sortearBtn.disabled = false;
            sortearBtn.style.opacity = '1';
            sortearBtn.style.cursor = 'pointer';
            if (qtdDesejada > restantes) {
                statusMsg.innerHTML = `⚠️ Atenção: Você quer sortear ${qtdDesejada} número(s), mas só restam ${restantes} número(s) disponível(is). O sorteio respeitará os disponíveis.`;
            } else {
                statusMsg.innerHTML = `🎲 Intervalo [${intervaloMin} → ${intervaloMax}] | ${jaSorteados} sorteados | ${restantes} restantes. Clique em sortear!`;
            }
        }
    }

    // Para parar a animação da bola (rolamento visual)
    function pararAnimacaoRolagem() {
        if (rollInterval) {
            clearInterval(rollInterval);
            rollInterval = null;
        }
        if (animationTimer) {
            clearTimeout(animationTimer);
            animationTimer = null;
        }
        bolaDiv.classList.remove('bola-animada');
        if (!rouletteAudio.paused) {
            rouletteAudio.pause();
            rouletteAudio.currentTime = 0;
        }
        isRolling = false;
    }

    // Inicia efeito "bola rolando" com números aleatórios rápidos
    function iniciarRolagem(callbackFinal) {
        if (isRolling) return;
        pararAnimacaoRolagem(); // garantir limpeza
        isRolling = true;
        bolaDiv.classList.add('bola-animada');

        // Tocar áudio de roleta enquanto a bola roda
        rouletteAudio.currentTime = 0;
        rouletteAudio.play().catch(() => {
            // autoplay pode ser bloqueado em alguns navegadores; não impede o sorteio
        });

        // Números falsos rápidos pra dar efeito de roleta
        let fakeCount = 0;
        const MAX_FAKE = 18; // quantidade de trocas antes do resultado final
        rollInterval = setInterval(() => {
            if (!isRolling) {
                if (rollInterval) clearInterval(rollInterval);
                return;
            }
            // gerar número fictício dentro do intervalo atual (ou fallback)
            let fakeNum = Math.floor(Math.random() * (intervaloMax - intervaloMin + 1)) + intervaloMin;
            bolaDiv.textContent = fakeNum;
            fakeCount++;
            // após algumas trocas, paramos e chamamos o callback que dará o número real
            if (fakeCount >= MAX_FAKE) {
                clearInterval(rollInterval);
                rollInterval = null;
                // Pequeno delay para finalizar animação e apresentar número verdadeiro
                animationTimer = setTimeout(() => {
                    bolaDiv.classList.remove('bola-animada');
                    if (!rouletteAudio.paused) {
                        rouletteAudio.pause();
                        rouletteAudio.currentTime = 0;
                    }
                    if (!resultAudio.paused) {
                        resultAudio.pause();
                    }
                    resultAudio.currentTime = 0;
                    resultAudio.play().catch(() => {
                        // autoplay pode ser bloqueado em alguns navegadores; não impede o sorteio
                    });
                    if (callbackFinal) callbackFinal();
                    isRolling = false;
                }, 80);
            }
        }, 55);
    }

    // Função principal: sortear novo número (com animação e sem repetição)
    function realizarSorteio() {
        // Se já estiver rolando, evita múltiplos cliques
        if (isRolling) {
            statusMsg.innerHTML = "🌀 O sorteio já está em andamento, aguarde...";
            return;
        }

        // Atualizar referências de intervalo
        let minVal = parseInt(minInput.value, 10);
        let maxVal = parseInt(maxInput.value, 10);
        if (isNaN(minVal)) minVal = 1;
        if (isNaN(maxVal)) maxVal = 80;
        if (minVal > maxVal) {
            [minVal, maxVal] = [maxVal, minVal];
            minInput.value = minVal;
            maxInput.value = maxVal;
        }
        intervaloMin = minVal;
        intervaloMax = maxVal;

        // Valida quantidade desejada para esta rodada (mas sorteamos apenas 1 número por clique)
        // Porém a lógica de "quantos sortear" é contínua: o usuário pode clicar várias vezes.
        // Mas colocamos uma validação de limite de sorteio por clique de acordo com restantes
        const totalDisponivel = intervaloMax - intervaloMin + 1;
        const sorteadosCount = numerosSorteados.length;
        if (sorteadosCount >= totalDisponivel) {
            statusMsg.innerHTML = `🚫 Sem números disponíveis! Todos de ${intervaloMin} a ${intervaloMax} já saíram. Pressione LIMPAR.`;
            atualizarStatusMsg();
            return;
        }

        // O usuário pode sortear UM número por clique. Mas adicionamos a possibilidade de sortear múltiplos?
        // O enunciado diz "sorteador de números que não repita", não obriga múltiplos por clique, mas é mais divertido.
        // Vamos adotar: Cada clique sorteia 1 número, mas o campo "quantos sortear" indica quantos números
        // o usuário deseja no total; porém isso gera confusão. Refinando: farei um sorteio em lote considerando a quantidade?
        // O título pede "mostre os números rolando na tela, com uma bola rolando" - melhor cada clique = 1 número.
        // Mas o campo quantidade pode ser interpretado como "quantos números serão sorteados no total antes de reset".
        // Vou adotar: cada clique sorteia APENAS 1 número, mas o campo quantidade mostra o planejado ou limite de itens desejados? 
        // Vou alterar: de acordo com boas práticas, o campo "quantos sortear" passa a ser um aviso de quantos números faltam, ou sorteio múltiplo?
        // refletindo: O usuário define "de 1 a 80" e decide quantos números quer no total? É melhor sortear um por vez mas com trava de quantidade total a atingir.
        // vou implementar o modo "sorteio individual , porém com contador de meta". O usuário pode sortear até a quantidade desejada.
        // Melhor: campo "Meta de números distintos" -> o usuário define quantos números ele quer sortear (máx = total disponivel)
        // Então cada clique sorteia 1 número até completar a meta. A bola rola e mostra o número.
        let metaDesejada = parseInt(qtdInput.value, 10);
        if (isNaN(metaDesejada) || metaDesejada < 1) metaDesejada = 1;
        const limiteMaximoPossivel = totalDisponivel;
        if (metaDesejada > limiteMaximoPossivel) {
            metaDesejada = limiteMaximoPossivel;
            qtdInput.value = limiteMaximoPossivel;
            statusMsg.innerHTML = `⚠️ Quantidade ajustada para o máximo (${limiteMaximoPossivel}) disponível no intervalo.`;
        }

        // Se já atingimos a meta (quantidade de números sorteados >= meta), não pode sortear mais
        if (numerosSorteados.length >= metaDesejada) {
            statusMsg.innerHTML = `🏆 Você já sorteou ${numerosSorteados.length} número(s) e sua meta era ${metaDesejada}. Clique em LIMPAR para reiniciar ou mude a meta!`;
            sortearBtn.disabled = false;
            atualizarStatusMsg();
            return;
        }

        // Verificar restantes versus meta
        const restantesParaMeta = metaDesejada - numerosSorteados.length;
        if (restantesParaMeta <= 0) {
            statusMsg.innerHTML = `✅ Meta atingida! ${numerosSorteados.length}/${metaDesejada} números sorteados.`;
            atualizarStatusMsg();
            return;
        }

        // Agora sim: iniciar rolagem com animação e depois sortear um número realmente não repetido
        iniciarRolagem(() => {
            // Depois da animação, escolher número novo e não repetido
            const numerosRestantes = [];
            for (let i = intervaloMin; i <= intervaloMax; i++) {
                if (!numerosSorteados.includes(i)) {
                    numerosRestantes.push(i);
                }
            }
            if (numerosRestantes.length === 0) {
                bolaDiv.textContent = "❌";
                statusMsg.innerHTML = `Sem números disponíveis! Limpe a lista.`;
                atualizarStatusMsg();
                return;
            }
            // Seleciona aleatório entre os disponíveis
            const randomIndex = Math.floor(Math.random() * numerosRestantes.length);
            const novoNumero = numerosRestantes[randomIndex];

            // Adiciona à lista
            numerosSorteados.push(novoNumero);
            atualizarListaVisual();

            // Mostra o número na bola
            bolaDiv.textContent = novoNumero;

            // Mensagem de sucesso
            const restantesAgora = (intervaloMax - intervaloMin + 1) - numerosSorteados.length;
            const metaAtual = parseInt(qtdInput.value, 10);
            const faltamMeta = metaAtual - numerosSorteados.length;
            if (numerosSorteados.length >= metaAtual) {
                statusMsg.innerHTML = `🎉 PARABÉNS! Você atingiu a meta de ${metaAtual} número(s) distintos! 🎉`;
                sortearBtn.disabled = false;
            } else {
                statusMsg.innerHTML = `✨ Sorteado: ${novoNumero} | Total sorteados: ${numerosSorteados.length}/${metaAtual} | Restam ${restantesAgora} números no intervalo. ✨`;
            }
            atualizarStatusMsg();

            // Se após o sorteio a meta foi completada, desabilitar indicação visual mas liberamos depois.
            if (numerosSorteados.length >= metaAtual) {
                // não desabilitamos o botão, mas a mensagem já orienta limpar
                // mas o botão ainda pode sortear? não, porque a checagem no início vai barrar.
            }
            // reativar o estado de rolagem finalizado
        });
    }

    // Função reset total: limpa sorteados, reinicia bola
    function resetarSorteio() {
        if (isRolling) {
            pararAnimacaoRolagem();
            isRolling = false;
            bolaDiv.classList.remove('bola-animada');
        }
        numerosSorteados = [];
        atualizarListaVisual();
        // Sincronizar valores de intervalo atuais
        let minVal = parseInt(minInput.value, 10);
        let maxVal = parseInt(maxInput.value, 10);
        if (isNaN(minVal)) minVal = 1;
        if (isNaN(maxVal)) maxVal = 80;
        if (minVal > maxVal) {
            [minVal, maxVal] = [maxVal, minVal];
            minInput.value = minVal;
            maxInput.value = maxVal;
        }
        intervaloMin = minVal;
        intervaloMax = maxVal;
        // Ajustar quantidade meta para respeitar o range
        let meta = parseInt(qtdInput.value, 10);
        const maxPossivel = intervaloMax - intervaloMin + 1;
        if (isNaN(meta) || meta < 1) meta = 1;
        if (meta > maxPossivel) {
            meta = maxPossivel;
            qtdInput.value = maxPossivel;
        }
        bolaDiv.textContent = "?";
        statusMsg.innerHTML = `🔄 Reset concluído! Intervalo ${intervaloMin} → ${intervaloMax} | Meta: ${meta} números. Comece a sortear!`;
        atualizarStatusMsg();
        sortearBtn.disabled = false;
        sortearBtn.style.opacity = '1';
    }

    // ao alterar intervalo ou meta, revalida e reseta a lista de sorteados automaticamente? 
    // Para evitar inconsistências, ao mudar o intervalo ou a quantidade, resetamos automaticamente?
    // Melhor: resetar automaticamente se o usuário mudar os limites, pois os números antigos não farão sentido.
    function configMudou() {
        if (isRolling) {
            pararAnimacaoRolagem();
            bolaDiv.classList.remove('bola-animada');
        }
        // Atualizar variáveis
        let novomin = parseInt(minInput.value, 10);
        let novomax = parseInt(maxInput.value, 10);
        if (isNaN(novomin)) novomin = 1;
        if (isNaN(novomax)) novomax = 80;
        if (novomin > novomax) {
            [novomin, novomax] = [novomax, novomin];
            minInput.value = novomin;
            maxInput.value = novomax;
        }
        intervaloMin = novomin;
        intervaloMax = novomax;
        let meta = parseInt(qtdInput.value, 10);
        const maxTotal = intervaloMax - intervaloMin + 1;
        if (isNaN(meta) || meta < 1) meta = 1;
        if (meta > maxTotal) {
            meta = maxTotal;
            qtdInput.value = maxTotal;
        }
        // Força limpeza dos sorteados anteriores pois o universo mudou
        numerosSorteados = [];
        atualizarListaVisual();
        bolaDiv.textContent = "?";
        atualizarStatusMsg();
        statusMsg.innerHTML = `⚙️ Intervalo alterado para [${intervaloMin} - ${intervaloMax}]. Meta redefinida para ${meta}. Os sorteios serão sem repetição!`;
        sortearBtn.disabled = false;
        sortearBtn.style.opacity = '1';
    }

    // Eventos
    sortearBtn.addEventListener('click', realizarSorteio);
    resetBtn.addEventListener('click', resetarSorteio);
    minInput.addEventListener('change', configMudou);
    maxInput.addEventListener('change', configMudou);
    qtdInput.addEventListener('change', function() {
        let novameta = parseInt(qtdInput.value,10);
        let maxPossivel = (intervaloMax - intervaloMin + 1);
        if (isNaN(novameta)) novameta = 1;
        if (novameta < 1) novameta = 1;
        if (novameta > maxPossivel) {
            novameta = maxPossivel;
            qtdInput.value = maxPossivel;
        }
        if (numerosSorteados.length > novameta) {
            // se a meta for menor que os já sorteados, questionar: reset ou truncar? Ideal fazer um reset suave
            if (confirm("A nova quantidade de sorteios desejada é menor que os números já sorteados. Deseja reiniciar o sorteio para aplicar a nova meta?")) {
                resetarSorteio();
            } else {
                // mantém como está mas ajusta a mensagem
                statusMsg.innerHTML = `Meta alterada para ${novameta}, porém já existem ${numerosSorteados.length} números sorteados.`;
                atualizarStatusMsg();
            }
        } else {
            atualizarStatusMsg();
            statusMsg.innerHTML = `✅ Meta ajustada para ${novameta} número(s). Continue sorteando!`;
        }
    });

    // inicialização
    function init() {
        intervaloMin = 1;
        intervaloMax = 80;
        minInput.value = 1;
        maxInput.value = 80;
        qtdInput.value = 6;
        numerosSorteados = [];
        atualizarListaVisual();
        bolaDiv.textContent = "?";
        atualizarStatusMsg();
        statusMsg.innerHTML = "🎯 Bem-vindo! Defina o intervalo e a quantidade desejada. Clique em sortear para ver a bola rolar!";
    }
    init();
</script>
